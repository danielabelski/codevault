function OnboardingWizard({ onComplete }) {
  const [step, setStep] = useState(0);
  const [copied, setCopied] = useState(false);
  const [setupMethod, setSetupMethod] = useState(null);
  const totalSteps = 3;

  const copyCmd = (text) => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    }).catch(() => {});
  };

  const handleFinish = () => {
    try { localStorage.setItem('cv-onboarded', 'true'); } catch(e) {}
    onComplete();
  };

  const renderStep = () => {
    switch(step) {
      case 0: return (
        <>
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 16 }}>
            <div style={{ width: 56, height: 56, background: 'linear-gradient(135deg, var(--accent), #7eb8c4)', borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {I.lock(28, '#fff')}
            </div>
          </div>
          <div className="onboard-h1">Welcome to CodeVault</div>
          <div className="onboard-sub">
            Visual lock control for your codebase. Protect UI, logic, and data layers independently.
            Tell AI agents exactly what they can and can't touch.
          </div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            {[
              { icon: I.lock(14, 'var(--locked)'), text: 'Three-layer lock control' },
              { icon: I.arrowRight(14, 'var(--accent)'), text: 'Architecture visualization' },
              { icon: I.clipboard(14, 'var(--caution)'), text: 'Full audit trail' },
              { icon: I.download(14, 'var(--open)'), text: 'AI-ready config export' },
            ].map((item, i) => (
              <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '8px 10px', background: 'var(--panel2)', borderRadius: 8, fontSize: 11, color: 'var(--text2)' }}>
                <span style={{ flexShrink: 0 }}>{item.icon}</span>
                {item.text}
              </div>
            ))}
          </div>
        </>
      );

      case 1: return (
        <>
          <div className="onboard-h1">Connect Your Codebase</div>
          <div className="onboard-sub">Pick how you want to load your project into CodeVault.</div>

          <div className={'onboard-option' + (setupMethod === 'scan' ? ' selected' : '')} onClick={() => setSetupMethod('scan')}>
            <div className="onboard-option-num">1</div>
            <div className="onboard-option-text">
              <strong>Auto-scan (recommended)</strong>
              <span>One command scans your project, detects your framework, and generates everything automatically.</span>
            </div>
          </div>

          {setupMethod === 'scan' && (
            <div style={{ marginLeft: 36, marginBottom: 12 }}>
              <div className="onboard-cmd" onClick={() => copyCmd('node setup.mjs')}>
                <code>node setup.mjs</code>
                <span className="copy-tag">{copied ? 'Copied!' : 'Click to copy'}</span>
              </div>
              <div style={{ fontSize: 11, color: 'var(--text3)', lineHeight: 1.5 }}>
                Run from the CodeVault folder. Auto-detects your framework and project name from <strong>package.json</strong>. Creates <strong>codevault-data.js</strong> + <strong>LOCK_CONFIG.json</strong>, then refresh this page.
              </div>
            </div>
          )}

          <div className={'onboard-option' + (setupMethod === 'ai' ? ' selected' : '')} onClick={() => setSetupMethod('ai')}>
            <div className="onboard-option-num">2</div>
            <div className="onboard-option-text">
              <strong>Let your AI agent do it</strong>
              <span>Point Claude Code, Cursor, or Copilot at this folder — it reads CLAUDE.md and sets up automatically.</span>
            </div>
          </div>

          {setupMethod === 'ai' && (
            <div style={{ marginLeft: 36, marginBottom: 12 }}>
              <div className="onboard-cmd" onClick={() => copyCmd('Read the CLAUDE.md in the codevault folder and run setup.mjs to scan my codebase and generate the CodeVault data files.')}>
                <code style={{ fontSize: 11, whiteSpace: 'normal', lineHeight: 1.4 }}>Read the CLAUDE.md in the codevault folder and run setup.mjs to scan my codebase.</code>
                <span className="copy-tag">{copied ? 'Copied!' : 'Copy prompt'}</span>
              </div>
              <div style={{ fontSize: 11, color: 'var(--text3)', lineHeight: 1.5 }}>
                Paste this into your AI agent, or just point it at this folder — the <strong>CLAUDE.md</strong> tells it exactly what to do.
              </div>
            </div>
          )}

          <div className={'onboard-option' + (setupMethod === 'empty' ? ' selected' : '')} onClick={() => setSetupMethod('empty')}>
            <div className="onboard-option-num">3</div>
            <div className="onboard-option-text">
              <strong>Start empty</strong>
              <span>Jump straight in and explore the interface. You can connect your project later.</span>
            </div>
          </div>
        </>
      );

      case 2: return (
        <>
          <div style={{ display: 'flex', justifyContent: 'center', marginBottom: 16 }}>
            <div style={{ width: 56, height: 56, background: 'var(--openBg)', border: '2px solid var(--open)', borderRadius: 14, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              {I.check(28, 'var(--open)')}
            </div>
          </div>
          <div className="onboard-h1">You're Ready!</div>
          <div className="onboard-sub">Here's what you can do in CodeVault:</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 6 }}>
            {[
              { label: 'Lock Grid', desc: 'Set granular lock states on every route, API, action, and table.' },
              { label: 'Architecture', desc: 'Interactive graph of your system with live lock state overlays.' },
              { label: 'Data Flow', desc: 'Trace how pages connect through functions to your database.' },
              { label: 'Audit Log', desc: 'Every lock change is recorded with timestamps and session IDs.' },
              { label: 'Connect File', desc: 'Link a LOCK_CONFIG.json for auto-save directly to disk.' },
              { label: 'Export', desc: 'Generate config that AI agents read before editing your code.' },
            ].map((item, i) => (
              <div key={i} style={{ padding: '8px 10px', background: 'var(--panel2)', borderRadius: 8, fontSize: 11 }}>
                <strong style={{ color: 'var(--accent)', display: 'block', marginBottom: 2, fontSize: 12 }}>{item.label}</strong>
                <span style={{ color: 'var(--text3)', lineHeight: 1.4 }}>{item.desc}</span>
              </div>
            ))}
          </div>
        </>
      );
    }
  };

  return (
    <div className="onboard-overlay">
      <div className="onboard-card">
        <div className="onboard-step-dots">
          {Array.from({ length: totalSteps }, (_, i) => (
            <div key={i} className={'onboard-dot' + (i === step ? ' active' : i < step ? ' done' : '')} />
          ))}
        </div>
        {renderStep()}
        <div className="onboard-actions">
          {step > 0 && <button className="onboard-btn secondary" onClick={() => setStep(s => s - 1)}>Back</button>}
          {step < totalSteps - 1 ? (
            <button className="onboard-btn primary" onClick={() => setStep(s => s + 1)}
              disabled={step === 1 && !setupMethod}>
              {step === 0 ? 'Get Started' : 'Continue'}
            </button>
          ) : (
            <button className="onboard-btn primary" onClick={handleFinish}>Launch CodeVault</button>
          )}
        </div>
      </div>
    </div>
  );
}

function CodeVault() {
  const [currentView, setCurrentView] = useState('overview');
  const [selectedNode, setSelectedNode] = useState(null);
  const [searchQuery, setSearchQuery] = useState('');
  const [theme, setTheme] = useState('dark');
  const [activeEnv, setActiveEnv] = useState('staging');
  const [locks, setLocks] = useState({});
  const [connected, setConnected] = useState(false);
  const [syncCopied, setSyncCopied] = useState(false);
  const [showToast, setShowToast] = useState(false);
  const [showDetail, setShowDetail] = useState(false);
  const [pendingUnlocks, setPendingUnlocks] = useState([]);
  const [pendingFilterActive, setPendingFilterActive] = useState(false);
  const [activePlatform, setActivePlatform] = useState('all');
  const [auditLog, setAuditLog] = useState(() => {
    try { const s = localStorage.getItem('cv-audit-log'); return s ? JSON.parse(s) : []; } catch(e) { return []; }
  });
  const [showSettings, setShowSettings] = useState(false);
  const [envUrls, setEnvUrls] = useState(() => loadEnvUrls());
  const [showOnboarding, setShowOnboarding] = useState(() => {
    // Show onboarding if never completed AND no external data loaded
    try {
      const done = localStorage.getItem('cv-onboarded');
      if (done === 'true') return false;
    } catch(e) {}
    // If data was provided externally, skip onboarding
    if (window.CODEVAULT_DATA && (window.CODEVAULT_DATA.routes?.length > 0 || window.CODEVAULT_DATA.tables?.length > 0)) return false;
    return true;
  });
  const fileHandleRef = useRef(null);
  const fileAuditLog = useRef([]);
  const sessionId = useRef('s-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,6));
  const initialLoad = useRef(false);

  // Sync ENV_URLS global when envUrls state changes
  useEffect(() => {
    ENV_URLS = envUrls;
  }, [envUrls]);

  // Initialize locks
  useEffect(() => {
    const allNodes = [...ROUTES, ...API_ROUTES, ...TABLES, ...SERVER_ACTIONS, ...DIRECTORY_RULES];
    const initialLocks = {};
    allNodes.forEach(n => {
      initialLocks[n.id] = { _default: { ui: 'locked', logic: 'locked', data: 'locked' } };
    });
    setLocks(initialLocks);
  }, []);

  const getLockForPlatform = useCallback((id, platform) => {
    const entry = locks[id];
    if (!entry) return {ui:'locked',logic:'locked',data:'locked'};
    if (!platform || platform === 'all') return entry._default || entry;
    if (entry[platform]) return entry[platform];
    return entry._default || {ui:'locked',logic:'locked',data:'locked'};
  }, [locks]);

  // Persist audit log to localStorage
  useEffect(() => {
    try { localStorage.setItem('cv-audit-log', JSON.stringify(auditLog.slice(-500))); } catch(e) {}
  }, [auditLog]);

  // Dynamic per-file nodes from pendingUnlocks files arrays + fileOverrides
  const fileNodes = useMemo(() => {
    const seen = new Set();
    const nodes = [];
    pendingUnlocks.forEach(p => {
      if (!p.files || !Array.isArray(p.files)) return;
      p.files.forEach(filePath => {
        if (seen.has(filePath)) return;
        seen.add(filePath);
        const parentDir = DIRECTORY_RULES.find(d => {
          const glob = d.path.replace(/\*\*$/, '');
          return filePath.startsWith(glob);
        });
        const fileName = filePath.split('/').pop();
        nodes.push({
          id: 'file-' + filePath.replace(/[^a-zA-Z0-9]/g, '-'),
          name: fileName,
          path: filePath,
          type: 'file',
          group: parentDir ? parentDir.group : 'dir-rules',
          platform: parentDir ? parentDir.platform : 'shared',
          parentDirId: parentDir ? parentDir.id : null,
          parentPattern: parentDir ? parentDir.path : null,
          note: ''
        });
      });
    });
    return nodes;
  }, [pendingUnlocks, locks]);

  // Auto-initialize lock state for dynamically created file nodes
  useEffect(() => {
    if (fileNodes.length === 0) return;
    setLocks(prev => {
      let changed = false;
      const next = {...prev};
      fileNodes.forEach(fn => {
        if (!next[fn.id]) {
          changed = true;
          const parentLock = fn.parentDirId && prev[fn.parentDirId];
          next[fn.id] = parentLock ? JSON.parse(JSON.stringify(parentLock)) : {_default:{ui:'locked',logic:'locked',data:'locked'}};
        }
      });
      return changed ? next : prev;
    });
  }, [fileNodes]);

  // Auto-clear pending unlock requests when ALL requested files are unlocked
  useEffect(() => {
    if (pendingUnlocks.length === 0) return;
    const remaining = pendingUnlocks.filter(p => {
      const requestedLayers = (p.layers || ['ui','logic','data']).map(l=>l.toLowerCase());
      if (p.files && Array.isArray(p.files) && p.files.length > 0) {
        return !p.files.every(filePath => {
          const fileId = 'file-' + filePath.replace(/[^a-zA-Z0-9]/g, '-');
          const entry = locks[fileId];
          if (!entry) return false;
          const s = entry._default || {ui:'locked',logic:'locked',data:'locked'};
          return requestedLayers.every(l => s[l] === 'open');
        });
      }
      const entryId = p.entry || '';
      const nodeId = entryId.includes('.') ? entryId.split('.').slice(1).join('.') : entryId;
      const entry = locks[nodeId];
      if (!entry) return true;
      const s = entry._default || {ui:'locked',logic:'locked',data:'locked'};
      return !requestedLayers.every(l => s[l] === 'open');
    });
    if (remaining.length !== pendingUnlocks.length) setPendingUnlocks(remaining);
  }, [locks, pendingUnlocks]);

  const allNodes = useMemo(() => [...ROUTES, ...API_ROUTES, ...TABLES, ...SERVER_ACTIONS, ...DIRECTORY_RULES, ...fileNodes], [fileNodes]);

  const filteredNodes = useMemo(() => {
    let nodes = allNodes;
    // Platform filter controls lock states, not node visibility
    if (!searchQuery.trim()) return nodes;
    const q = searchQuery.toLowerCase();
    return nodes.filter(n =>
      n.name.toLowerCase().includes(q) ||
      n.id.toLowerCase().includes(q) ||
      (n.path && n.path.toLowerCase().includes(q))
    );
  }, [allNodes, searchQuery]);

  const buildConfigJSON = useCallback((lockState) => {
    const cfg = {
      version: '1.1.0',
      project: _d.projectName || 'My Project',
      framework: _d.framework || 'generic',
      description: 'Lock configuration for CodeVault. Three-layer access control: UI, Logic, Data.',
      _states: {
        locked: 'LOCKED — Do not modify. Refuse changes.',
        caution: 'CAUTION — Ask first. Require explicit confirmation.',
        open: 'OPEN — Proceed freely.'
      },
      _layers: {
        ui: 'Visual layout, styling, CSS classes, component structure, HTML/JSX markup',
        logic: 'Business rules, validation, calculations, workflows, state management',
        data: 'Database queries, API calls, data schemas, request/response shapes'
      },
      _platforms: {
        web: 'Web application (React, Next.js, Vue, HTML/CSS, browser JS/TS)',
        ios: 'Native iOS (Swift, SwiftUI, UIKit)',
        android: 'Native Android (Kotlin, Jetpack Compose)',
        backend: 'Server-side (APIs, databases, middleware)',
        shared: 'Cross-platform (utilities, types, configs)'
      },
      routes: {},
      serverActions: {},
      tables: {},
      apiRoutes: {},
      directoryRules: [],
      _auditLog: fileAuditLog.current || [],
      _pendingUnlocks: pendingUnlocks.length > 0 ? pendingUnlocks : undefined
    };

    allNodes.forEach(n => {
      const lockEntry = lockState[n.id] || {_default:{ui:'locked',logic:'locked',data:'locked'}};
      const def = lockEntry._default || {ui:'locked',logic:'locked',data:'locked'};
      const entry = {path:n.path||'',name:n.name,platform:n.platform||'web',ui:def.ui,logic:def.logic,data:def.data};
      const overrides = {};
      ['web','ios','android','backend','shared'].forEach(p => {
        if (lockEntry[p] && (lockEntry[p].ui !== def.ui || lockEntry[p].logic !== def.logic || lockEntry[p].data !== def.data)) {
          overrides[p] = {ui:lockEntry[p].ui, logic:lockEntry[p].logic, data:lockEntry[p].data};
        }
      });
      if (Object.keys(overrides).length > 0) entry.platformOverrides = overrides;

      if (n.type === 'dir') {
        const dirEntry = { pattern: n.path, ui: def.ui, logic: def.logic, data: def.data, note: n.note || '' };
        const fileOverrides = {};
        allNodes.filter(fn => fn.type === 'file' && fn.parentDirId === n.id).forEach(fn => {
          const fileLock = lockState[fn.id];
          if (fileLock) {
            const fd = fileLock._default || {ui:'locked',logic:'locked',data:'locked'};
            if (fd.ui !== def.ui || fd.logic !== def.logic || fd.data !== def.data) {
              fileOverrides[fn.path] = {ui:fd.ui,logic:fd.logic,data:fd.data};
            }
          }
        });
        if (Object.keys(fileOverrides).length > 0) dirEntry.fileOverrides = fileOverrides;
        cfg.directoryRules.push(dirEntry);
      } else if (n.type === 'file') {
        // File nodes written as fileOverrides in parent dir — skip standalone
      } else if (n.type === 'page') cfg.routes[n.id] = entry;
      else if (n.type === 'api') cfg.apiRoutes[n.id] = entry;
      else if (n.funcs) cfg.serverActions[n.id] = entry;
      else if (n.domain) cfg.tables[n.id] = entry;
      else cfg.routes[n.id] = entry;
    });

    return JSON.stringify(cfg, null, 2);
  }, [allNodes]);

  const importConfig = useCallback((json) => {
    try {
      const cfg = JSON.parse(json);
      const newLocks = {};
      allNodes.forEach(n => {
        newLocks[n.id] = { _default: { ui: 'locked', logic: 'locked', data: 'locked' } };
      });

      const sections = [cfg.routes, cfg.serverActions, cfg.tables, cfg.apiRoutes];
      sections.forEach(section => {
        if (!section) return;
        Object.entries(section).forEach(([id, entry]) => {
          if (newLocks[id]) {
            const lockEntry = {_default:{ui:entry.ui||'locked',logic:entry.logic||'locked',data:entry.data||'locked'}};
            if (entry.platformOverrides) {
              Object.entries(entry.platformOverrides).forEach(([p,s]) => {
                lockEntry[p] = {ui:s.ui||'locked',logic:s.logic||'locked',data:s.data||'locked'};
              });
            }
            newLocks[id] = lockEntry;
          }
        });
      });

      // Apply directoryRules from config — match by pattern to DIRECTORY_RULES node ids
      if (cfg.directoryRules && Array.isArray(cfg.directoryRules)) {
        cfg.directoryRules.forEach(rule => {
          const dirNode = DIRECTORY_RULES.find(d => d.path === rule.pattern);
          if (dirNode && newLocks[dirNode.id]) {
            newLocks[dirNode.id] = { _default: { ui: rule.ui || 'locked', logic: rule.logic || 'locked', data: rule.data || 'locked' } };
          }
          // Import per-file overrides
          if (rule.fileOverrides && typeof rule.fileOverrides === 'object') {
            Object.entries(rule.fileOverrides).forEach(([filePath, fileState]) => {
              const fileId = 'file-' + filePath.replace(/[^a-zA-Z0-9]/g, '-');
              newLocks[fileId] = {_default:{ui:fileState.ui||'locked',logic:fileState.logic||'locked',data:fileState.data||'locked'}};
            });
          }
        });
      }

      // Read _auditLog from file and merge into dashboard audit log
      if (cfg._auditLog && Array.isArray(cfg._auditLog)) {
        fileAuditLog.current = cfg._auditLog;
      }
      if (cfg._auditLog && Array.isArray(cfg._auditLog) && cfg._auditLog.length > 0) {
        setAuditLog(prev => {
          const existingKeys = new Set(prev.map(e => e.timestamp + '|' + e.target + '|' + e.layer));
          const newEntries = cfg._auditLog.map(e => ({
            id: 'file-' + (e.timestamp || '') + '-' + (e.entry || ''),
            timestamp: e.timestamp,
            target: e.entry,
            targetName: e.entry,
            targetType: 'file-audit',
            layer: (e.layers || []).join('+') || 'all',
            from: Object.values(e.previousState || {})[0] || 'locked',
            to: Object.values(e.newState || {})[0] || 'open',
            source: e.session || 'claude',
            reason: e.reason || '',
            session: e.approvedBy || 'unknown'
          })).filter(e => !existingKeys.has(e.timestamp + '|' + e.target + '|' + e.layer));
          return [...prev, ...newEntries];
        });
      }

      // Read _pendingUnlocks from file
      if (cfg._pendingUnlocks && Array.isArray(cfg._pendingUnlocks)) {
        setPendingUnlocks(cfg._pendingUnlocks);
      } else {
        setPendingUnlocks([]);
      }

      return newLocks;
    } catch (e) {
      console.error('Failed to parse LOCK_CONFIG.json:', e);
      return null;
    }
  }, [allNodes]);

  const connectToFile = useCallback(async () => {
    try {
      if (!window.showOpenFilePicker) {
        alert('File System Access API not supported. Use Chrome or Edge.');
        return;
      }
      const [handle] = await window.showOpenFilePicker({
        types: [{ description: 'JSON Config', accept: { 'application/json': ['.json'] } }],
        multiple: false
      });

      const file = await handle.getFile();
      const text = await file.text();
      const imported = importConfig(text);

      if (imported) {
        initialLoad.current = true;
        setLocks(imported);
        fileHandleRef.current = handle;
        setConnected(true);
        setTimeout(() => { initialLoad.current = false; }, 500);
      } else {
        alert('Could not parse as LOCK_CONFIG.json');
      }
    } catch (e) {
      if (e.name !== 'AbortError') {
        console.error('Connect failed:', e);
      }
    }
  }, [importConfig]);

  const disconnectFile = useCallback(() => {
    fileHandleRef.current = null;
    setConnected(false);
  }, []);

  // Auto-save
  useEffect(() => {
    if (!connected || !fileHandleRef.current || initialLoad.current) return;

    const saveToFile = async () => {
      try {
        const writable = await fileHandleRef.current.createWritable();
        await writable.write(buildConfigJSON(locks));
        await writable.close();
        setShowToast(true);
        setTimeout(() => setShowToast(false), 1500);
      } catch (e) {
        console.error('Auto-save failed:', e);
        if (e.name === 'NotAllowedError') {
          fileHandleRef.current = null;
          setConnected(false);
        }
      }
    };

    const timer = setTimeout(saveToFile, 300);
    return () => clearTimeout(timer);
  }, [locks, connected, buildConfigJSON]);

  // Auto-refresh
  const lastFileModified = useRef(0);
  useEffect(() => {
    if (!connected || !fileHandleRef.current) return;

    const interval = setInterval(async () => {
      try {
        const file = await fileHandleRef.current.getFile();
        if (file.lastModified !== lastFileModified.current) {
          lastFileModified.current = file.lastModified;
          const text = await file.text();
          const imported = importConfig(text);
          if (imported) {
            // Log detected external changes
            const prevLocks = locks;
            Object.keys(imported).forEach(nodeId => {
              ['ui', 'logic', 'data'].forEach(layer => {
                const oldVal = prevLocks[nodeId]?.[layer] || 'locked';
                const newVal = imported[nodeId]?.[layer] || 'locked';
                if (oldVal !== newVal) {
                  logAuditEntry(nodeId, layer, oldVal, newVal, 'external-sync');
                }
              });
            });
            initialLoad.current = true;
            setLocks(imported);
            setTimeout(() => { initialLoad.current = false; }, 500);
          }
        }
      } catch (e) {}
    }, 3000);

    return () => clearInterval(interval);
  }, [connected, importConfig, locks, logAuditEntry]);

  const getOverall = useCallback((id) => {
    const entry = locks[id];
    if (!entry) return 'locked';
    if (activePlatform !== 'all' && entry[activePlatform]) {
      const s = entry[activePlatform];
      if (s.ui === 'locked' || s.logic === 'locked' || s.data === 'locked') return 'locked';
      if (s.ui === 'caution' || s.logic === 'caution' || s.data === 'caution') return 'caution';
      return 'open';
    }
    // When viewing "All" — aggregate across _default AND all platform overrides
    const platforms = [entry._default || {ui:'locked',logic:'locked',data:'locked'}];
    ['web','ios','android','backend','shared'].forEach(p => { if (entry[p]) platforms.push(entry[p]); });
    let hasOpen = false, hasCaution = false;
    platforms.forEach(s => {
      if (s.ui === 'open' || s.logic === 'open' || s.data === 'open') hasOpen = true;
      else if (s.ui === 'caution' || s.logic === 'caution' || s.data === 'caution') hasCaution = true;
    });
    if (hasOpen) return 'open';
    if (hasCaution) return 'caution';
    return 'locked';
  }, [locks, activePlatform]);

  // Check if a node has pending unlock requests from AI agents
  const getPendingUnlock = useCallback((nodeId) => {
    return pendingUnlocks.find(p => {
      const entryId = p.entry || '';
      if (entryId === nodeId || entryId.endsWith('.' + nodeId)) return true;
      if (nodeId.startsWith('file-') && p.files && Array.isArray(p.files)) {
        const node = fileNodes.find(fn => fn.id === nodeId);
        if (node && p.files.includes(node.path)) return true;
      }
      return false;
    });
  }, [pendingUnlocks]);

  const logAuditEntry = useCallback((nodeId, layer, fromState, toState, source = 'codevault-ui', reason = '') => {
    const node = allNodes.find(n => n.id === nodeId);
    setAuditLog(prev => [...prev, {
      id: 'a-' + Date.now().toString(36) + Math.random().toString(36).slice(2,5),
      timestamp: new Date().toISOString(),
      target: nodeId,
      targetName: node?.name || nodeId,
      targetType: node?.type === 'page' ? 'route' : node?.type === 'api' ? 'api' : node?.domain ? 'table' : 'action',
      layer,
      from: fromState,
      to: toState,
      source,
      reason,
      session: sessionId.current
    }]);
  }, [allNodes]);

  const updateLock = useCallback((nodeId, layer, state) => {
    const platform = activePlatform === 'all' ? '_default' : activePlatform;
    setLocks(prev=>{
      const entry = prev[nodeId] || {_default:{ui:'locked',logic:'locked',data:'locked'}};
      const current = entry[platform] || {...(entry._default || {ui:'locked',logic:'locked',data:'locked'})};
      const oldState = current[layer]||'locked';
      if(oldState!==state) logAuditEntry(nodeId,layer,oldState,state);
      return {...prev,[nodeId]:{...entry,[platform]:{...current,[layer]:state}}};
    });
  }, [logAuditEntry, activePlatform]);

  const handleNodeClick = useCallback((node) => {
    setSelectedNode(node);
    setShowDetail(true);
  }, []);

  const handleExport = useCallback(() => {
    const json = buildConfigJSON(locks);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'LOCK_CONFIG.json';
    a.click();
    URL.revokeObjectURL(url);
  }, [locks, buildConfigJSON]);

  const handleImportFile = useCallback(async (e) => {
    const file = e.target.files?.[0];
    if (!file) return;

    const text = await file.text();
    const imported = importConfig(text);
    if (imported) {
      setLocks(imported);
    } else {
      alert('Invalid LOCK_CONFIG.json format');
    }
  }, [importConfig]);

  // Check if data is loaded
  const hasData = ROUTES.length > 0 || API_ROUTES.length > 0 || TABLES.length > 0 || SERVER_ACTIONS.length > 0 || DIRECTORY_RULES.length > 0;

  // Show onboarding wizard when no data and not yet completed
  if (!hasData && showOnboarding) {
    return (
      <div className="root" data-theme={theme}>
        <OnboardingWizard onComplete={() => setShowOnboarding(false)} />
      </div>
    );
  }

  // Show "no data" fallback only after onboarding was completed or skipped
  if (!hasData) {
    return (
      <div className="root" data-theme={theme}>
        <div style={{ flex: 1 }}>
          <div className="welcome-screen">
            <div className="welcome-icon">{I.lock(48, 'var(--accent)')}</div>
            <h1 className="welcome-title">CodeVault v1.1</h1>
            <p className="welcome-text">
              Universal lock control system for your codebase.
            </p>
            <div className="welcome-code">
              Run in your project:<br/>
              node setup.mjs
            </div>
            <p className="welcome-text" style={{ fontSize: '12px', color: 'var(--text3)' }}>
              This will scan your codebase and create codevault-data.js in the same directory as this file.
            </p>
            <button className="onboard-btn primary" onClick={() => setShowOnboarding(true)} style={{ marginTop: 16 }}>
              Restart Setup Wizard
            </button>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="root" data-theme={theme}>
      {/* SIDEBAR */}
      <div className="sidebar">
        <div className="header">
          <div className="logo">CodeVault</div>
          <div style={{ display: 'flex', gap: 4 }}>
            <button
              onClick={() => setShowSettings(true)}
              style={{ display: 'flex', alignItems: 'center', cursor: 'pointer' }}
              title="Settings"
            >{I.settings(16, 'var(--text2)')}</button>
            <button
              onClick={() => setTheme(t => t === 'dark' ? 'light' : 'dark')}
              style={{ display: 'flex', alignItems: 'center', cursor: 'pointer' }}
            >
              {theme === 'dark' ? I.sun(16, 'var(--text2)') : I.moon(16, 'var(--text2)')}
            </button>
          </div>
        </div>
        <div className="search-box">
          <input
            className="input"
            placeholder="Search..."
            value={searchQuery}
            onChange={e => setSearchQuery(e.target.value)}
          />
        </div>
        {/* Platform Filter */}
        <div style={{ display: 'flex', gap: 6, padding: '8px 16px', borderBottom: '1px solid var(--border)', flexWrap: 'wrap', alignItems: 'center' }}>
          <span style={{ fontSize: 11, color: 'var(--text3)', fontWeight: 600, marginRight: 4 }}>PLATFORM:</span>
          {Object.entries(PLATFORM_DEFS).map(([key, p]) => {
            const count = key === 'all' ? allNodes.length : allNodes.filter(n => (n.platform || 'web') === key).length;
            if (key !== 'all' && count === 0) return null;
            return (
              <button key={key} onClick={() => setActivePlatform(key)}
                style={{
                  padding: '4px 12px', borderRadius: 20, fontSize: 11, fontWeight: 600,
                  cursor: 'pointer', display: 'inline-flex', alignItems: 'center', gap: 5,
                  border: activePlatform === key ? '1px solid var(--accent)' : '1px solid var(--border)',
                  background: activePlatform === key ? 'var(--card)' : 'transparent',
                  color: activePlatform === key ? 'var(--text1)' : 'var(--text3)',
                  transition: 'all 0.15s'
                }}>
                {p.icon} {p.label} <span style={{ background: 'rgba(255,255,255,0.1)', padding: '1px 6px', borderRadius: 10, fontSize: 10 }}>{count}</span>
              </button>
            );
          })}
        </div>
        <div className="node-list">
          {filteredNodes.map(node => (
            <div
              key={node.id}
              className={`node-item ${selectedNode?.id === node.id ? 'selected' : ''}`}
              onClick={() => handleNodeClick(node)}
            >
              <div
                className="node-item-icon"
                style={{
                  backgroundColor:
                    node.type === 'page' ? 'var(--route)' :
                    node.type === 'api' ? 'var(--api)' :
                    node.domain ? 'var(--table)' :
                    node.funcs ? 'var(--action)' :
                    'var(--accent)'
                }}
              />
              <div style={{ flex: 1, display: 'flex', alignItems: 'center', gap: 6 }}>
                <div className="node-item-text">{node.name}</div>
                {node.platform && node.platform !== 'web' && (
                  <span style={{ fontSize: 8, padding: '1px 5px', borderRadius: 6, background: 'rgba(99,102,241,0.1)', color: 'var(--accent)', fontWeight: 700, whiteSpace: 'nowrap' }}>
                    {PLATFORM_DEFS[node.platform]?.label}
                  </span>
                )}
              </div>
              <div
                className={`node-item-lock ${getOverall(node.id)}`}

                  )}
                </div>
                <button className="detail-close" onClick={() => setShowDetail(false)} style={{ display: 'flex', alignItems: 'center' }}>{I.x(16, 'var(--text2)')}</button>
              </div>
              <div className="detail-body">
                {/* Lock Controls */}
                <div className="detail-section">
                  <div className="detail-section-title">Lock State {activePlatform !== 'all' && <span style={{fontSize:'10px',padding:'1px 6px',borderRadius:3,background:'rgba(91,154,160,0.15)',color:'var(--accent)',fontWeight:600,marginLeft:6}}>{PLATFORM_DEFS[activePlatform]?.label}</span>}</div>
                  {(() => { const pendingInfo = getPendingUnlock(selectedNode.id); const pendingLayerSet = pendingInfo ? new Set((pendingInfo.layers||[]).map(l=>l.toLowerCase())) : null; return (
                  <div className="lock-controls">
                    {['ui', 'logic', 'data'].map(layer => {
                      const entry = locks[selectedNode.id] || {_default:{ui:'locked',logic:'locked',data:'locked'}};
                      const sub = (activePlatform !== 'all' && entry[activePlatform]) ? entry[activePlatform] : (entry._default || {ui:'locked',logic:'locked',data:'locked'});
                      const isTarget = pendingLayerSet && pendingLayerSet.has(layer);
                      return (
                        <div key={layer} style={{ flex: 1, background: isTarget ? 'rgba(245,158,11,0.1)' : 'transparent', borderRadius: 6, padding: isTarget ? '4px' : 0 }}>
                          <div style={{ fontSize: '11px', color: isTarget ? '#F59E0B' : 'var(--text2)', marginBottom: '4px', textTransform: 'uppercase', fontWeight: isTarget ? '700' : '600' }}>
                            {isTarget ? '⚠ ' : ''}{layer}
                          </div>
                          <div className="layer-lock-btns">
                            {['locked', 'caution', 'open'].map(state => (
                              <button
                                key={state}
                                className={`layer-lock-btn ${state}${isTarget && state === 'open' ? ' pending-highlight' : ''}`}
                                onClick={() => updateLock(selectedNode.id, layer, state)}
                                style={{
                                  backgroundColor:
                                    (sub[layer] || 'locked') === state
                                      ? state === 'locked' ? 'var(--locked)' : state === 'caution' ? 'var(--caution)' : 'var(--open)'
                                      : 'transparent',
                                  color:
                                    (sub[layer] || 'locked') === state ? '#fff' : 'var(--text2)',
                                  borderColor:
                                    isTarget && state === 'open' ? '#F59E0B' :
                                    state === 'locked' ? 'var(--locked)' : state === 'caution' ? 'var(--caution)' : 'var(--open)',
                                  fontWeight:
                                    (sub[layer] || 'locked') === state ? '600' : '500'
                                }}
                                title={isTarget && state === 'open' ? `⚠ AI requests: Click to unlock ${layer.toUpperCase()}` : `${layer}: ${state}`}
                              >
                                {state === 'locked' ? I.lock(12) : state === 'caution' ? I.alert(12) : I.check(12)}
                              </button>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  ); })()}
                </div>

                {/* Details */}
                <div className="detail-section">
                  <div className="detail-section-title">Type</div>
                  <div className="detail-section-content">
                    {selectedNode.type === 'page' && 'Page (Route)'}
                    {selectedNode.type === 'api' && 'API Route'}
                    {selectedNode.domain && !selectedNode.funcs && 'Database Table'}
                    {selectedNode.funcs && 'Server Actions'}
                  </div>
                </div>

                {selectedNode.group && (
                  <div className="detail-section">
                    <div className="detail-section-title">Group</div>
                    <div className="detail-section-content">{selectedNode.group}</div>
                  </div>
                )}

                {selectedNode.tables && (
                  <div className="detail-section">
                    <div className="detail-section-title">Tables</div>
                    <div className="detail-section-content">
                      {selectedNode.tables.join(', ')}
                    </div>
                  </div>
                )}

                {selectedNode.funcs && (
                  <div className="detail-section">
                    <div className="detail-section-title">Functions</div>
                    <div className="detail-section-content">
                      {selectedNode.funcs.join(', ')}
                    </div>
                  </div>
                )}

                {selectedNode.domain && (
                  <div className="detail-section">
                    <div className="detail-section-title">Domain</div>
                    <div className="detail-section-content">{selectedNode.domain}</div>
                  </div>
                )}

                {selectedNode.reads !== undefined && (
                  <div className="detail-section">
                    <div className="detail-section-title">Read by</div>
                    <div className="detail-section-content">{selectedNode.reads} files</div>
                  </div>
                )}

                {selectedNode.writes !== undefined && (
                  <div className="detail-section">
                    <div className="detail-section-title">Written by</div>
                    <div className="detail-section-content">{selectedNode.writes} files</div>
                  </div>
                )}

                {/* Audit History for this item */}
                {(() => {
                  const itemLog = auditLog.filter(l => l.target === selectedNode.id).reverse().slice(0, 20);
                  if (itemLog.length === 0) return (
                    <div className="detail-section">
                      <div className="detail-section-title">Change History</div>
                      <div style={{ fontSize: '12px', color: 'var(--text3)', padding: '8px 0' }}>No changes recorded for this item yet.</div>
                    </div>
                  );
                  return (
                    <div className="detail-section">
                      <div className="detail-section-title">Change History ({itemLog.length > 20 ? '20 most recent' : itemLog.length})</div>
                      {itemLog.map(entry => (
                        <div key={entry.id} className="audit-detail-row">
                          <div className="audit-detail-time">
                            {(() => { try { const d = new Date(entry.timestamp); return d.toLocaleDateString(undefined, { month:'short', day:'numeric' }) + ' ' + d.toLocaleTimeString(undefined, { hour:'2-digit', minute:'2-digit' }); } catch(e) { return entry.timestamp; }})()}
                          </div>
                          <span className="audit-tag" style={{ background: 'var(--panel2)', color: 'var(--accent)', textTransform: 'uppercase', fontSize: '10px' }}>{entry.layer}</span>
                          <span style={{ display: 'inline-flex', alignItems: 'center', gap: '3px', fontSize: '11px' }}>
                            <span className="audit-tag" style={{ background: entry.from === 'locked' ? 'var(--lockedBg)' : entry.from === 'caution' ? 'var(--cautionBg)' : 'var(--openBg)', color: entry.from === 'locked' ? 'var(--locked)' : entry.from === 'caution' ? 'var(--caution)' : 'var(--open)', fontSize: '10px' }}>{entry.from}</span>
                            <span style={{ color: 'var(--text3)', display: 'inline-flex', alignItems: 'center' }}>{I.arrowRight(10, 'var(--text3)')}</span>
                            <span className="audit-tag" style={{ background: entry.to === 'locked' ? 'var(--lockedBg)' : entry.to === 'caution' ? 'var(--cautionBg)' : 'var(--openBg)', color: entry.to === 'locked' ? 'var(--locked)' : entry.to === 'caution' ? 'var(--caution)' : 'var(--open)', fontSize: '10px' }}>{entry.to}</span>
                          </span>
                          <span style={{ fontSize: '10px', color: 'var(--text3)', marginLeft: 'auto' }}>{entry.source}</span>
                        </div>
                      ))}
                      {auditLog.filter(l => l.target === selectedNode.id).length > 20 && (
                        <div style={{ fontSize: '11px', color: 'var(--text3)', padding: '6px 0', textAlign: 'center' }}>
                          Showing 20 most recent. View full history in Audit Log tab.
                        </div>
                      )}
                    </div>
                  );
                })()}
              </div>
            </div>
          )}
        </div>
      </div>

      {/* SETTINGS MODAL */}
      {showSettings && (
        <div className="modal-overlay" onClick={() => setShowSettings(false)}>
          <div className="modal" style={{ minWidth: 420 }} onClick={e => e.stopPropagation()}>
            <div className="modal-title" style={{ display: 'flex', alignItems: 'center', gap: 8 }}>{I.settings(18, 'var(--accent)')} CodeVault Settings</div>
            <div className="modal-content">
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontWeight: 600, marginBottom: 6, fontSize: 14 }}>Environment URLs</div>
                <p style={{ fontSize: 12, color: 'var(--text2)', marginBottom: 12 }}>
                  Configure your staging and production URLs. These make item paths clickable throughout the app.
                </p>
                <label style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 12, fontWeight: 600, color: 'var(--text2)', marginBottom: 4 }}>{I.hardhat(12, 'var(--text2)')} Staging URL</label>
                <input
                  className="input"
                  style={{ width: '100%', marginBottom: 12 }}
                  placeholder="http://localhost:3000"
                  defaultValue={envUrls.staging}
                  id="cv-settings-staging"
                />
                <label style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 12, fontWeight: 600, color: 'var(--text2)', marginBottom: 4 }}>{I.globe(12, 'var(--text2)')} Production URL</label>
                <input
                  className="input"
                  style={{ width: '100%' }}
                  placeholder="https://yourapp.com"
                  defaultValue={envUrls.production}
                  id="cv-settings-production"
                />
              </div>
              <div style={{ marginBottom: 16 }}>
                <div style={{ fontWeight: 600, marginBottom: 6, fontSize: 14 }}>Project Info</div>
                <div style={{ fontSize: 12, color: 'var(--text2)' }}>
                  <strong>Project:</strong> {_d.projectName || 'My Project'}<br/>
                  <strong>Framework:</strong> {_d.framework || 'generic'}<br/>
                  <span style={{ display: 'inline-flex', alignItems: 'center', gap: 4 }}><strong>File Status:</strong> {connected ? <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3, color: 'var(--open)' }}>{I.checkCircle(12, 'var(--open)')} Connected</span> : <span style={{ display: 'inline-flex', alignItems: 'center', gap: 3, color: 'var(--text3)' }}>{I.circle(12, 'var(--text3)')} Not connected</span>}</span>
                </div>
              </div>
            </div>
            <div className="modal-buttons">
              <button className="btn secondary" onClick={() => setShowSettings(false)}>Cancel</button>
              <button className="btn" onClick={() => {
                const stg = document.getElementById('cv-settings-staging')?.value || '';
                const prod = document.getElementById('cv-settings-production')?.value || '';
                const newUrls = { staging: stg.replace(/\/+$/, ''), production: prod.replace(/\/+$/, '') };
                setEnvUrls(newUrls);
                try { localStorage.setItem('cv-env-urls', JSON.stringify(newUrls)); } catch(e) {}
                setShowSettings(false);
              }}>Save Settings</button>
            </div>
          </div>
        </div>
      )}

      {/* TOAST */}
      {showToast && <div className="toast" style={{ display: 'flex', alignItems: 'center', gap: 6 }}>{I.check(14, '#fff')} Saved to LOCK_CONFIG.json</div>}
    </div>
  );
}

ReactDOM.render(<CodeVault />, document.getElementById('app'));
</script>
</body>
</html>
